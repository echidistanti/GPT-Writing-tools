<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
    }
    input[type="text"], select {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      margin-bottom: 20px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 12px;
      text-align: left;
    }
    th {
      background-color: #f5f5f5;
    }
    .button {
      padding: 8px 15px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 10px;
    }
    .button:hover {
      background: #45a049;
    }
    .button.delete {
      background: #f44336;
    }
    .button.delete:hover {
      background: #d32f2f;
    }
    .button.save {
      background: #2196F3;
    }
    .button.save:hover {
      background: #1976D2;
    }
    .button-group {
      margin-top: 20px;
      display: flex;
      align-items: center;
    }
    .save-status {
      color: #4CAF50;
      margin-left: 10px;
      display: none;
    }
    .modified {
      background-color: #fff3e0;
    }
  </style>
</head>
<body>
  <h2>Impostazioni GPT Helper</h2>
  
  <div class="form-group">
    <label>API Key OpenAI:</label>
    <input type="text" id="apiKey">
  </div>
  
  <div class="form-group">
    <label>Modello:</label>
    <select id="model">
      <option value="">Caricamento modelli...</option>
    </select>
  </div>
  
  <h3>Gestione Prompt</h3>
  <table id="promptsTable">
    <thead>
      <tr>
        <th>Nome</th>
        <th>Prompt</th>
        <th>Azioni</th>
      </tr>
    </thead>
    <tbody>
    </tbody>
  </table>
  
  <div class="button-group">
    <button class="button" id="addPrompt">Aggiungi Prompt</button>
    <button class="button save" id="savePrompts">Salva Modifiche</button>
    <span id="saveStatus" class="save-status">Modifiche salvate!</span>
  </div>

  <script src="options.js"></script>
</body>
</html>
