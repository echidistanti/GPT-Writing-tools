<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GPT Helper Settings</title>
    <link rel="stylesheet" type="text/css" href="styles/options.css">
</head>
<body>
    <div class="container">
        <div class="section">
            <h2 data-i18n="settingsTitle">GPT Helper Settings</h2>
            
            <div class="form-group">
                <label for="apiKey" id="apiKeyLabel">
                    OpenAI API Key:
                </label>
                <input type="password" id="apiKey" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="model">Model:</label>
                <select id="model">
                    <option value="">Select a model...</option>
                </select>
            </div>
        </div>

        <div class="section">
            <h2 data-i18n="promptsManagementTitle">Prompts Management</h2>
            
            <table id="promptsTable" class="table">
                <thead>
                    <tr>
                        <th style="width: 30%" data-i18n="columnName">Name</th>
                        <th style="width: 60%" data-i18n="columnPrompt">Prompt</th>
                        <th style="width: 10%" data-i18n="columnActions">Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

            <div class="button-group">
                <button id="addPrompt" class="button" data-i18n="buttonAdd">Add Prompt</button>
                <button id="savePrompts" class="button" data-i18n="buttonSave">Save Changes</button>
                <span id="saveStatus" class="save-status" data-i18n="saveSuccess">Changes saved!</span>
            </div>
        </div>
    </div>
    <script src="options.js"></script>
</body>
</html>
