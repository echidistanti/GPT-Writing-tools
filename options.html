<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="styles/options.css">
</head>
<body>
    <div class="container">
        <div class="section">
            <h2 data-i18n="settingsTitle">GPT Helper Settings</h2>
            
            <div class="form-group">
                <label for="apiKey" data-i18n="apiKeyLabel">OpenAI API Key:</label>
                <input type="password" id="apiKey" />
            </div>

            <div class="form-group">
                <label for="model" data-i18n="modelLabel">Model:</label>
                <select id="model">
                    <option value="">Loading models...</option>
                </select>
            </div>
        </div>

        <div class="section">
            <h2 data-i18n="promptsManagementTitle">Prompts Management</h2>
            
            <table id="promptsTable" class="table">
                <thead>
                    <tr>
                        <th data-i18n="columnName">Name</th>
                        <th data-i18n="columnPrompt">Prompt</th>
                        <th data-i18n="columnActions">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Filled dynamically -->
                </tbody>
            </table>

            <div class="button-group">
                <button id="addPrompt" class="button" data-i18n="buttonAdd">Add Prompt</button>
                <button id="savePrompts" class="button" disabled data-i18n="buttonSave">Save Changes</button>
                <span id="saveStatus" class="save-status" data-i18n="saveSuccess">Changes saved!</span>
            </div>
        </div>
    </div>

    <script src="options.js"></script>
</body>
</html>
